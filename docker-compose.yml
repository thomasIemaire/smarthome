services:
  backend:
    build: ./backend
    container_name: smarthome-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=["http://148.230.126.181","http://148.230.126.181:80","http://localhost:4200"]
      - DATA_DIR=/app/data
    volumes:
      - backend-data:/app/data
    networks:
      - smarthome

  frontend:
    build: ./frontend
    container_name: smarthome-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smarthome

volumes:
  backend-data:

networks:
  smarthome:
    driver: bridge
