<div class="group-bar">
  <span class="group-bar__label">Groupes</span>

  @for (group of groupStore.groups(); track group.id) {
    <button
      class="group-bar__chip"
      [class.active]="group.active"
      (click)="onChipClick(group)"
    >
      <span class="group-bar__chip-dot"></span>
      <span class="group-bar__chip-name">{{ group.name }}</span>
      <button class="group-bar__chip-edit" (click)="onEditClick($event, group)" aria-label="Edit group">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
      </button>
    </button>
  }

  <button class="group-bar__add" (click)="onAddClick()">+</button>
</div>

<app-group-modal
  [group]="editingGroup()"
  [open]="modalOpen()"
  [devices]="deviceStore.devices()"
  (saved)="onModalSaved($event)"
  (deleted)="onModalDeleted($event)"
  (closed)="onModalClosed()"
/>
