<div class="card" [class.on]="device().state" [class.plug]="device().type === 'plug'" [class.light]="device().type === 'light'">
  <button class="card__edit" (click)="onEdit($event)" aria-label="Edit device">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
    </svg>
  </button>

  <div class="card__icon">{{ icon }}</div>
  <div class="card__name">{{ device().name }}</div>
  <div class="card__room">{{ device().room || 'Unassigned' }}</div>
  <div class="card__status" [class.active]="device().state">{{ statusText }}</div>

  <div class="card__toggle">
    <app-toggle-switch
      [checked]="device().state"
      [accentType]="device().type"
      (changed)="onToggle()"
    />
  </div>
</div>
